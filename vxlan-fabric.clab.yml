name: vxlan-fabric

topology:
  defaults:
    env:
      QEMU_MEMORY: 6144
      QEMU_SMP: 2

  nodes:
    spine1:
      kind: cisco_n9kv
      image: vrnetlab/cisco_n9kv:9300-10.5.5
      startup-config: saved-configs/spine1.cfg
    spine2:
      kind: cisco_n9kv
      image: vrnetlab/cisco_n9kv:9300-10.5.5
      startup-config: saved-configs/spine2.cfg
    leaf1:
      kind: cisco_n9kv
      image: vrnetlab/cisco_n9kv:9300-10.5.5
      startup-config: saved-configs/leaf1.cfg
    leaf2:
      kind: cisco_n9kv
      image: vrnetlab/cisco_n9kv:9300-10.5.5
      startup-config: saved-configs/leaf2.cfg
    host1:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 192.168.10.1/24 dev eth1
        - ip link set eth1 up
    host2:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr flush dev eth1
        - ip addr add 10.10.20.20/24 dev eth1
        - ip link set eth1 up
        - ip route add default via 10.10.20.1
    ext-rtr:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      exec:
        - ip addr add 10.99.99.2/30 dev eth1
        - ip link set eth1 up
        - ip link add name lo99 type dummy
        - ip addr add 10.99.99.99/32 dev lo99
        - ip link set lo99 up
        - sh -c 'sed -i "s/^bgpd=no/bgpd=yes/" /etc/frr/daemons; /usr/lib/frr/frrinit.sh restart'  


  links:
    - endpoints: ["leaf1:eth1", "spine1:eth1"]
    - endpoints: ["leaf1:eth2", "spine2:eth1"]
    - endpoints: ["leaf2:eth1", "spine1:eth2"]
    - endpoints: ["leaf2:eth2", "spine2:eth2"]
    - endpoints: ["host1:eth1", "leaf1:eth3"]
    - endpoints: ["host2:eth1", "leaf2:eth3"]
    - endpoints: ["leaf2:eth4", "ext-rtr:eth1"]
